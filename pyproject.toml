[tool.ruff]
line-length = 200
target-version = "py313"

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
]
ignore = []

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --alluredir=allure-results --clean-alluredir"
markers = [
    "smoke: fast smoke tests",
    "regression: regression tests",
    "api: FastAPI endpoint tests",
    "ml: ML model and prediction tests",
    "preprocess: data preprocessing tests",
]